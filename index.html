<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bike Geometry Comparison</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    min-height: 100vh;
    padding: 24px;
  }

  h1 {
    text-align: center;
    font-size: 1.8rem;
    margin-bottom: 24px;
    color: #fff;
    letter-spacing: -0.5px;
  }

  /* Bike input cards */
  #bikes-container {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    justify-content: center;
    margin-bottom: 24px;
  }

  .bike-card {
    background: #16213e;
    border: 1px solid #0f3460;
    border-radius: 10px;
    padding: 16px;
    width: 340px;
    position: relative;
  }

  .bike-card .remove-btn {
    position: absolute;
    top: 8px;
    right: 10px;
    background: none;
    border: none;
    color: #666;
    font-size: 1.2rem;
    cursor: pointer;
    line-height: 1;
  }
  .bike-card .remove-btn:hover { color: #e74c3c; }

  .diagram-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 12px;
  }
  .diagram-header h2 { margin-bottom: 0; }

  .visibility-toggles {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .vis-toggle {
    padding: 4px 12px;
    border: 2px solid var(--bike-color);
    border-radius: 20px;
    background: transparent;
    color: #556;
    font-size: 0.78rem;
    cursor: pointer;
    transition: all 0.15s;
  }
  .vis-toggle.active {
    background: var(--bike-color);
    color: #fff;
  }
  .vis-toggle:hover { opacity: 0.8; }

  .bike-card label {
    display: block;
    font-size: 0.75rem;
    color: #8899aa;
    margin-bottom: 2px;
    margin-top: 10px;
  }
  .bike-card label:first-of-type { margin-top: 0; }

  .bike-card input[type="text"],
  .bike-card input[type="number"] {
    width: 100%;
    padding: 6px 8px;
    border: 1px solid #0f3460;
    border-radius: 5px;
    background: #1a1a2e;
    color: #e0e0e0;
    font-size: 0.9rem;
  }
  .bike-card input:focus {
    outline: none;
    border-color: #e94560;
  }

  .name-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .name-row input[type="text"] { flex: 1; }
  .name-row input[type="color"] {
    width: 32px;
    height: 32px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    background: none;
    padding: 0;
  }

  .preset-search {
    position: relative;
    margin-top: 8px;
  }
  .preset-search input {
    width: 100%;
    padding: 6px 28px 6px 8px;
    border: 1px solid #0f3460;
    border-radius: 5px;
    background: #1a1a2e;
    color: #e0e0e0;
    font-size: 0.85rem;
  }
  .preset-search input::placeholder { color: #556; }
  .preset-search input:focus { outline: none; border-color: #e94560; }
  .preset-search .chevron {
    position: absolute;
    right: 9px;
    top: 50%;
    transform: translateY(-50%);
    pointer-events: none;
    color: #8899aa;
    font-size: 0.6rem;
  }
  .preset-dropdown {
    display: none;
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    z-index: 100;
    background: #16213e;
    border: 1px solid #0f3460;
    border-radius: 0 0 5px 5px;
    max-height: 220px;
    overflow-y: auto;
    box-shadow: 0 8px 24px rgba(0,0,0,.4);
  }
  .preset-search.open .preset-dropdown { display: block; }
  .preset-search.open input { border-radius: 5px 5px 0 0; }
  .preset-dropdown .cat-label {
    padding: 6px 8px 2px;
    font-size: 0.7rem;
    color: #e94560;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .preset-dropdown .preset-option {
    padding: 5px 8px 5px 14px;
    font-size: 0.82rem;
    color: #ccc;
    cursor: pointer;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .preset-dropdown .preset-option:hover,
  .preset-dropdown .preset-option.active {
    background: #0f3460;
    color: #fff;
  }
  .preset-dropdown .preset-option .meta {
    color: #667;
    font-size: 0.75rem;
    margin-left: 4px;
  }
  .preset-dropdown .no-results {
    padding: 10px 8px;
    font-size: 0.82rem;
    color: #556;
    text-align: center;
  }

  .size-select {
    width: 100%;
    padding: 6px 8px;
    border: 1px solid #0f3460;
    border-radius: 5px;
    background: #1a1a2e;
    color: #e0e0e0;
    font-size: 0.85rem;
    margin-top: 6px;
    cursor: pointer;
  }
  .size-select:focus { outline: none; border-color: #e94560; }
  .size-select option { background: #1a1a2e; color: #e0e0e0; }

  .params-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0 12px;
  }
  .param-group { display: flex; flex-direction: column; }

  .param-pair-label {
    font-size: 0.75rem;
    color: #e94560;
    margin-top: 10px;
    margin-bottom: 2px;
    font-weight: 600;
  }
  .param-pair {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
    gap: 0 12px;
  }

  #add-bike-btn {
    display: block;
    margin: 0 auto 32px;
    padding: 10px 28px;
    background: #e94560;
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 0.95rem;
    cursor: pointer;
    font-weight: 600;
  }
  #add-bike-btn:hover { background: #c73750; }
  #add-bike-btn:disabled { background: #555; cursor: not-allowed; }

  /* SVG diagram */
  #diagram-section {
    background: #16213e;
    border: 1px solid #0f3460;
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 32px;
    overflow: hidden;
  }
  #diagram-section h2 {
    font-size: 1rem;
    margin-bottom: 12px;
    color: #8899aa;
    font-weight: 500;
  }
  #bike-svg {
    width: 100%;
    height: 500px;
    display: block;
  }

  /* Legend */
  .svg-legend {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    margin-top: 10px;
  }
  .svg-legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.85rem;
  }
  .legend-measure {
    font-size: 0.75rem;
    color: #8899aa;
    margin-left: 2px;
    font-style: italic;
  }
  .svg-legend-swatch {
    width: 14px;
    height: 14px;
    border-radius: 3px;
  }

  /* Comparison table */
  #table-section {
    background: #16213e;
    border: 1px solid #0f3460;
    border-radius: 10px;
    padding: 16px;
    overflow-x: auto;
  }
  #table-section h2 {
    font-size: 1rem;
    margin-bottom: 12px;
    color: #8899aa;
    font-weight: 500;
  }

  #comparison-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.9rem;
  }
  #comparison-table th,
  #comparison-table td {
    padding: 8px 12px;
    text-align: center;
    border-bottom: 1px solid #0f3460;
  }
  #comparison-table th {
    color: #8899aa;
    font-weight: 600;
    text-transform: uppercase;
    font-size: 0.75rem;
    letter-spacing: 0.5px;
  }
  #comparison-table td:first-child {
    text-align: left;
    color: #aaa;
    font-weight: 500;
  }
  #comparison-table tr:last-child td { border-bottom: none; }


  .cell-min { color: #3498db; font-weight: 700; }
  .cell-max { color: #e94560; font-weight: 700; }
  .delta-cell { color: #888; font-size: 0.8rem; }
</style>
</head>
<body>

<h1>Bike Geometry Comparison</h1>
<p style="text-align:center;color:#556;font-size:0.8rem;margin-top:-16px;margin-bottom:16px;">All measurements in mm, angles in degrees (°)</p>

<div id="bikes-container"></div>
<button id="add-bike-btn">+ Add Bike</button>

<div id="diagram-section">
  <div class="diagram-header">
    <h2>Geometry Overlay</h2>
    <div id="visibility-toggles" class="visibility-toggles"></div>
  </div>
  <svg id="bike-svg" xmlns="http://www.w3.org/2000/svg"></svg>
  <div id="svg-legend" class="svg-legend"></div>
</div>

<div id="table-section">
  <h2>Comparison Table</h2>
  <table id="comparison-table"></table>
</div>

<script src="app.js"></script>
</body>
</html>
